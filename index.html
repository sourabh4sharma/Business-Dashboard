<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark"></span>
    <div class="brand-text">
      <div class="brand-title">Collections Dashboard</div>
      <div class="brand-sub">Debtors &amp; recovery overview</div>
    </div>
  </div>
  <div class="topbar-right">
    <span id="busy" class="spinner" hidden></span>
    <span class="live"><span id="liveDot" class="live-dot"></span><span id="lastUpdated" class="muted"></span></span>
    <button id="pauseBtn" class="btn btn-ghost">Pause</button>
    <button id="refreshBtn" class="btn btn-primary">Refresh</button>
  </div>
</header>

<nav class="viewnav">
  <div class="viewnav-tabs">
    <button class="viewnav-btn active" data-view="overview">Overview</button>
    <button class="viewnav-btn" data-view="pod">POD Details</button>
  </div>
  <div class="podpicker" id="podPicker" hidden>
    <label for="podSelect">POD</label>
    <select id="podSelect"></select>
  </div>
</nav>

<main id="app">
  <div id="loadingMsg" class="loading-row muted"><span class="spinner"></span><span>Loading data…</span></div>
  <div id="errorMsg" class="error-box" hidden></div>

  <!-- ===== Overview ===== -->
  <section id="overviewView" class="view" hidden>
    <div id="kpiRow" class="kpi-row"></div>

    <div id="aiPanel" class="panel ai-panel">
      <div class="ai-head">
        <span class="ai-title">✦ Ask about this data</span>
        <span class="ai-note muted" id="aiNote"></span>
      </div>
      <form id="aiForm" class="ai-form">
        <input id="aiInput" type="text" autocomplete="off"
               placeholder="e.g. Which POD has the lowest collection %? Which category has the most overdue?">
        <button class="btn btn-primary" id="aiSend" type="submit">Ask</button>
      </form>
      <div id="aiAnswer" class="ai-answer" hidden></div>
    </div>

    <div id="tableNav" class="table-nav"></div>

    <div class="chart-grid">
      <div class="panel">
        <div class="panel-head">
          <h3 class="panel-title">Outstanding by category</h3>
          <span class="panel-sub">Current balance · ₹ Lakhs</span>
        </div>
        <div class="chart-holder"><canvas id="categoryChart"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <h3 class="panel-title">Outstanding by POD</h3>
          <span class="panel-sub">Current balance · ₹ Lakhs</span>
        </div>
        <div class="chart-holder"><canvas id="podChart"></canvas></div>
      </div>
    </div>

    <div class="panel" id="targetPanel" hidden>
      <div class="panel-head">
        <h3 class="panel-title">Collection target achievement</h3>
        <span class="panel-sub">Month to date</span>
      </div>
      <div id="targetMeters" class="meter-list"></div>
    </div>

    <div id="summaryTables" class="section-stack"></div>
  </section>

  <!-- ===== POD detail ===== -->
  <section id="podView" class="view" hidden>
    <div id="podCards" class="kpi-row"></div>
    <div id="podSummary" class="pod-panels"></div>
    <div class="toolbar">
      <input id="searchBox" type="text" placeholder="Search customer name…">
      <select id="statusFilter"><option value="">All statuses</option></select>
      <span id="rowCount" class="muted"></span>
    </div>
    <div class="table-wrap">
      <table id="podTable">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
